    <g fill="#e5e7eb" stroke="#9ca3af" stroke-width="3">
      <rect x="168" y="88" width="72" height="72" rx="8"/>
      <circle cx="62" cy="70" r="14"/>
      <circle cx="64" cy="172" r="14"/>
      <circle cx="304" cy="76" r="14"/>
      <circle cx="304" cy="184" r="14"/>
