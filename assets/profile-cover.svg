<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">FPV flight-control hardware, INAV firmware, and tuning tools</title>
  <desc id="desc">A technical banner showing a flight controller, ESC traces, a PID tuning graph, and INAV firmware work.</desc>
  <rect width="1200" height="420" fill="#f7faf9"/>
  <rect x="0" y="0" width="1200" height="12" fill="#111827"/>
  <g transform="translate(72 66)">
