      <rect x="198" y="0" width="132" height="36" rx="8" fill="#2563eb"/>
      <text x="216" y="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">INAV</text>
      <rect x="346" y="0" width="174" height="36" rx="8" fill="#ea580c"/>
      <text x="364" y="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#ffffff">Blackbox</text>
    </g>
  </g>
  <g transform="translate(694 52)">
