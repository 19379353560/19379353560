    <rect x="18" y="18" width="368" height="234" rx="8" fill="#1f2937"/>
    <g stroke="#34d399" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M62 70 H144 V118 H214"/>
      <path d="M64 172 H128 V138 H210"/>
      <path d="M218 118 H304 V76"/>
      <path d="M218 138 H304 V184"/>
